<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Introdução ao Bootstrap - Cores</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>

<body>
    <main>
        <section>
            <h1 class="h1">Cores no Bootstrap</h1>

            <div>
                <p class="h3 text-muted">Classe text-muted</p>
                <p class="h3 text-primary">Classe text-primary</p>
                <p class="h3 text-success">Classe text-success</p>
                <p class="h3 text-warning">Classe text-warning</p>
                <p class="h3 text-danger">Classe text-danger</p>
                <p class="h3 text-secondary">Classe text-secondary</p>
            </div>


        </section>

        <section>
            <h2>Botões no Bootstrap</h2>
            <button type="button" class="btn">Normal</button><br><br>
            <button type="button" class="btn btn-primary">Primário</button><br><br>
            <button type="button" class="btn btn-secondary">Secundário</button><br><br>
            <button type="button" class="btn btn-success">Sucesso</button><br><br>
            <button type="button" class="btn btn-info">Informacional</button><br><br>
            <button type="button" class="btn btn-warning">Alerta</button><br><br>
            <button type="button" class="btn btn-danger">Perigo</button><br><br>
            <button type="button" class="btn btn-dark">Dark</button><br><br>
            <button type="button" class="btn btn-light">Light</button><br><br>
            <button type="button" class="btn btn-link">link</button><br><br>


            <button type="button" class="btn btn-outline-danger">Outline danger</button><br><br>
            <button type="button" class="btn btn-outline-warning">outline warning</button><br><br>


        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
</body>

</html>
