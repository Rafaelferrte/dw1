<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Pseudo Elementos</title>
</head>
<body>
    <h1>Demonstração de Pseudo-Elementos</h1>

    <h2>::before - Adiciona conteúdo antes do elemento</h2>
    <p class="antes depois">Este paragrafo tem conteúdo adicionado ANTES através do ::before </p>

    <p class="antes">Outro paragrafo</p>

    <hr>
    <h2>Exemplo prático do ::before e ::after (Citações)</h2>
    <blockquote class="citacao">
        Só sei que nada sei - Sócrates. 399 a.c
    </blockquote>
</body>
</html>
