<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
</head>
<body>
    <table border="1">
        <thead>
            <tr>
                <th>Dado 1</th>
                <th>Dado 2</th>
                <th>Dado 3</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>1</td>
                <td>2</td>
                <td>3</td>
            </tr>
        </tbody>
    </table>

    <table border="1">
        <caption>Vendas do mes</caption>
        <thead>
            <tr>
                <th>Produto</th>
                <th>Quantidade</th>
                <th>Valor</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Mouse</td>
                <td>10</td>
                <td>R$ 20,00</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td colspan="2">Total:</td>
                <td>R$ 200,00</td>
            </tr>
        </tfoot>
    </table>


    <table border="1">
        <caption>Notas do alunos por disciplinas</caption>
        <thead>
            <tr>
                <th scope="col">Aluno</th>
                <th scope="col">Desenvolvimento web</th>
                <th scope="col">Design digital</th>
                <th scope="col">Banco de dados</th>
                <th scope="col">Algoritmos</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <th scope="row">Ana</th>
                <td>8.5</td>
                <td>9.0</td>
                <td>7.0</td>
                <td>8.0</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
