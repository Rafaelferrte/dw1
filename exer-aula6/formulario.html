<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Cadastro de Aluno</title>
</head>
<body>
    <h1>Cadastro de Aluno – DSM</h1>
    <p></p>

    <form action="#" method="POST">
        <fieldset>
            <legend>Dados Pessoais</legend>

            <label for="nome">Nome:</label><br>
            <input type="text" name="nome" id="nome" required>
            <br>
            <label for="email">E-mail:</label><br>
            <input type="text" name="email" id="email" required>
            <br>
            <label for="dtaNasc">Nome:</label><br>
            <input type="date" name="dtaNasc" id="dtaNasc">
            <br>
        </fieldset>
        <fieldset>
            <legend>Dados Acadêmicos</legend>

            <label for="curso">Curso:</label>
            <select name="curso" id="curso">
                <option value="dsm">DSM</option>
                <option value="ads">ADS</option>
                <option value="outro">Outro</option>
            </select>
            <br>
            <br>
            <label for="periodo">Periodo:</label>
            <input type="radio" name="periodo" id="manha" value="m">Manhã
            <input type="radio" name="periodo" id="noite" value="n">Noite
            <br>
            <br>
            <textarea name="obser" id="obser" rows="10" cols="40" placeholder="Escreva aqui suas observações">

            </textarea>

            <br><br><hr><br>
            <button type="submit">Enviar</button>
            <button type="reset">Limpar</button>
        </fieldset>
    </form>
</body>
</html>
